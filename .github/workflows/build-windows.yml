name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (eg: 1.0.1)'
        required: false
        default: '1.0.0'
        type: string

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build Electron app
        env:
          BUILD_TARGET: electron
        run: |
          npx vite build
          npx electron-builder --win

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $exe = (Get-ChildItem "dist-electron/*.exe" | Select-Object -First 1).FullName
          gh release create "v${{ inputs.version }}" $exe --title "Gestion Academica U9 v${{ inputs.version }}" --notes "Instalador Windows"
